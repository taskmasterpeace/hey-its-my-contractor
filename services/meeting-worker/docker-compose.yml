# Local dev: simulates the Fly deployment (worker + Qdrant) with one command.
#   docker compose up --build
# The Next.js web app runs on the host (`yarn dev`) and points WORKER_URL at
# http://localhost:8080.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  worker:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    environment:
      PORT: 8080
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-dev-secret}
      # host.docker.internal lets the container reach a DB running on your host.
      # If DATABASE_URL already points at a remote (Supabase), it's used as-is.
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: meeting_transcripts
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      SWEEP_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
